<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g3-body" cx="0.4" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.55" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="g3-hi" cx="0.4" cy="0.2" r="0.5">
      <stop offset="0" stop-color="white" stop-opacity="0.75"/>
      <stop offset="0.6" stop-color="white" stop-opacity="0.1"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3-bot" cx="0.55" cy="0.9" r="0.5">
      <stop offset="0" stop-color="#0c1e4d" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0c1e4d" stop-opacity="0"/>
    </radialGradient>
    <filter id="g3-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- gummi body -->
  <rect width="512" height="512" rx="120" fill="url(#g3-body)"/>
  <!-- bottom inner shadow (depth) -->
  <rect width="512" height="512" rx="120" fill="url(#g3-bot)"/>
  <!-- top translucent highlight (gummi gloss) -->
  <ellipse cx="200" cy="150" rx="200" ry="110" fill="url(#g3-hi)"/>
  <!-- small specular dot -->
  <ellipse cx="160" cy="118" rx="44" ry="18" fill="white" fill-opacity="0.55"/>

  <!-- 글자 그림자 (inner depth) -->
  <text x="256" y="386" font-family="system-ui, -apple-system, sans-serif"
        font-size="340" font-weight="800" fill="#0c1e4d" fill-opacity="0.3"
        text-anchor="middle" letter-spacing="-14" filter="url(#g3-blur)">g</text>
  <!-- 글자 본체 -->
  <text x="256" y="378" font-family="system-ui, -apple-system, sans-serif"
        font-size="340" font-weight="800" fill="white"
        text-anchor="middle" letter-spacing="-14">g</text>
</svg>

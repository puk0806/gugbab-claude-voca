<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.45" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="lg-hi" cx="0.35" cy="0.15" r="0.55">
      <stop offset="0" stop-color="white" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="white" stop-opacity="0.08"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lg-sh" cx="0.7" cy="1" r="0.7">
      <stop offset="0" stop-color="#1e1b4b" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lg-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.15"/>
      <stop offset="1" stop-color="white" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="lg-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- 베이스 그라데이션 -->
  <rect width="512" height="512" rx="114" fill="url(#lg-base)"/>
  <!-- 하단 깊이감 그라데이션 -->
  <rect width="512" height="512" rx="114" fill="url(#lg-sh)"/>
  <!-- 상단 빛 반사 (highlight) -->
  <rect width="512" height="512" rx="114" fill="url(#lg-hi)"/>

  <!-- 글자 그림자 (depth) -->
  <text x="256" y="382" font-family="system-ui, -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif"
        font-size="340" font-weight="800" fill="#1e1b4b" fill-opacity="0.25"
        text-anchor="middle" letter-spacing="-14" filter="url(#lg-blur)">g</text>
  <!-- 글자 본체 -->
  <text x="256" y="378" font-family="system-ui, -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif"
        font-size="340" font-weight="800" fill="white"
        text-anchor="middle" letter-spacing="-14">g</text>
  <!-- 글자 위 광택 (refraction 시뮬레이션) -->
  <text x="256" y="378" font-family="system-ui, -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif"
        font-size="340" font-weight="800" fill="white" fill-opacity="0.25"
        text-anchor="middle" letter-spacing="-14" transform="translate(-3 -3)">g</text>

  <!-- 외곽 glass rim (반사된 윤곽선) -->
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="url(#lg-rim)" stroke-width="2"/>
  <!-- 좌상단 specular highlight (강한 빛) -->
  <ellipse cx="170" cy="100" rx="130" ry="40" fill="white" fill-opacity="0.18"/>
</svg>
